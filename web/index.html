<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>geo-news — Americas map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.css">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="app-header">
    <h1>geo-news</h1>
    <nav class="mode-toggle" data-mode="publisher">
      <button data-mode="publisher" class="is-active" title="Group by the portal's home city">publisher</button>
      <button data-mode="event" title="Group by the place the story is about">event</button>
    </nav>
    <a class="about-link" href="https://github.com/helmedeiros/geo-news" target="_blank" rel="noopener">about</a>
  </header>
  <main class="app-main">
    <section id="map" class="app-map"></section>
    <aside class="app-sidebar">
      <div id="filters" class="app-filters"></div>
      <div id="headlines" class="app-headlines">
        <p class="loading">Loading the bundled dataset…</p>
      </div>
    </aside>
  </main>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/1.11.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/underscore.js/1.6.0/underscore-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.1.2/backbone-min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.3/leaflet.js"></script>
  <script src="js/models/headlines.js"></script>
  <script src="js/models/headline-filters.js"></script>
  <script src="js/views/map-view.js"></script>
  <script src="js/views/mode-toggle-view.js"></script>
  <script src="js/views/region-presets-view.js"></script>
  <script src="js/views/headline-list-view.js"></script>
  <script src="js/views/headline-filters-view.js"></script>
  <script src="js/controllers/app-controller.js"></script>
  <script src="js/url-state.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
